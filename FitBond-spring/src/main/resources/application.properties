spring.application.name=fitbond

# Configuration of the SGBD SQLite
spring.datasource.url=jdbc:sqlite:db/fitbond.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.datasource.username=admin
spring.datasource.password=admin123

# Configuration of Hibernate
spring.jpa.databaseplatform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# JWT
# Must be at least 32 characters. Change this to a long random string in production.
jwt.secret=fitbond-super-secret-key-change-me-in-production-2024
# Token lifetime: 7 days in milliseconds (optional ? default is already 7 days)
jwt.expiration-ms=604800000

spring.mvc.pathmatch.use-suffix-pattern=false